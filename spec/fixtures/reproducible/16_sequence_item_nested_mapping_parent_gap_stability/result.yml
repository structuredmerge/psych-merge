jobs:
  test:
    steps:
      - name: Install tree-sitter library
        uses: kettle-rb/ts-grammar-action@main
        with:
          setup-rust: "true"
          grammar-toml: "true"

      - name: Setup Ruby & RubyGems
        uses: ruby/setup-ruby@v1
        with:
          ore-install: true
          bundler-cache: true
